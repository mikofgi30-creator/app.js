<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Free Case</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* Попап */
#case-popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.popup-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
}

/* Кнопка */
button {
    padding: 10px 20px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* Анимация */
#case {
    font-size: 50px;
    margin: 20px;
}

.spin {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Результат */
#result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Добро пожаловать 🎮</h1>

<div id="case-popup">
    <div class="popup-content">
        <h2>Забери бесплатный кейс 🎁</h2>

        <div id="case">🎁</div>

        <button onclick="openCase()">Открыть</button>

        <div id="result"></div>
    </div>
</div>

<script>
// Проверка 24 часа
const now = Date.now();
const lastOpen = localStorage.getItem("last_open");

if (!lastOpen || now - lastOpen >= 24 * 60 * 60 * 1000) {
    showPopup();
}

// Показ попапа
function showPopup() {
    document.getElementById("case-popup").style.display = "block";
}

// Награды
const rewards = [
  { name: "⭐ 10 звезд", chance: 70 },
  { name: "⭐ 15 звезд", chance: 10 },
  { name: "⭐ 50 звезд", chance: 5 },
  { name: "⭐ 100 звезд", chance: 1 },
  { name: "🎨 Mood Pack", chance: 5 },
  { name: "🍬 Candy Cane", chance: 5 },
  { name: "🥊 UFC Strike", chance: 4 }
];

// Выбор награды
function getReward() {
    const total = rewards.reduce((sum, r) => sum + r.chance, 0);
    let rand = Math.random() * total;

    for (let reward of rewards) {
        if (rand < reward.chance) {
            return reward.name;
        }
        rand -= reward.chance;
    }
}

// Открытие кейса
function openCase() {
    const caseEl = document.getElementById("case");
    const resultEl = document.getElementById("result");

    resultEl.innerText = "";
    caseEl.classList.add("spin");

    setTimeout(() => {
        caseEl.classList.remove("spin");

        const reward = getReward();
        resultEl.innerText = "Ты получил: " + reward;

        localStorage.setItem("last_open", Date.now());
    }, 1500);
}
</script>

</body>
</html>
